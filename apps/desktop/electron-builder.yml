appId: com.omni.desktop
productName: Omni
protocols:
  - name: Omni Link
    schemes:
      - omni
files:
  - dist/**
  - src/renderer/**
  - preload.cjs
  - vendor/**
  - package.json
asarUnpack:
  - vendor/**
directories:
  output: out
win:
  signAndEditExecutable: false
  icon: build/logo-256.png
  target:
    - nsis
  artifactName: Omni-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
