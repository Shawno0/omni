<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Omni Vibe</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: rgba(28, 28, 30, 0.92);
        --bg-input: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.14);
        --text: #f2f2f2;
        --text-dim: #9aa0a6;
        --accent: #7c8cff;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
      }
      .card {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        -webkit-app-region: drag;
      }
      header {
        padding: 12px 16px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
      header .hint {
        font-size: 11px;
        color: var(--text-dim);
      }
      form,
      .transcript,
      .actions {
        -webkit-app-region: no-drag;
      }
      form {
        padding: 0 16px 12px;
        display: flex;
        gap: 8px;
      }
      input#prompt {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 14px;
        padding: 10px 12px;
        border-radius: 8px;
        outline: none;
      }
      input#prompt:focus {
        border-color: var(--accent);
      }
      button.primary {
        background: var(--accent);
        color: #0b0b0d;
        border: 0;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13px;
        padding: 0 14px;
        cursor: pointer;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: progress;
      }
      .transcript {
        flex: 1;
        overflow-y: auto;
        padding: 4px 16px 12px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--text);
      }
      .transcript .row {
        margin-bottom: 10px;
      }
      .transcript .role {
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 2px;
      }
      .actions {
        padding: 8px 16px 12px;
        display: flex;
        gap: 8px;
        border-top: 1px solid var(--border);
      }
      .actions button {
        background: transparent;
        color: var(--text-dim);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .actions button:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .empty {
        color: var(--text-dim);
        font-size: 12px;
        padding: 6px 0;
      }
    </style>
  </head>
  <body>
    <div class="card" role="dialog" aria-label="Omni Vibe overlay">
      <header>
        <h1>Omni Vibe</h1>
        <span class="hint">Esc to dismiss</span>
      </header>
      <form id="prompt-form">
        <input id="prompt" type="text" placeholder="Ask Omni, or type a path to create a workspace…" autocomplete="off" />
        <button type="submit" class="primary" id="submit">Send</button>
      </form>
      <div class="transcript" id="transcript">
        <div class="empty">Vibe is a minimal always-on-top launcher. Prompts submitted here are echoed back until provider streaming is wired into the overlay bridge.</div>
      </div>
      <div class="actions">
        <button id="action-workspace">Create workspace from path</button>
        <button id="action-hide">Hide</button>
      </div>
    </div>
    <script>
      (() => {
        const bridge = window.omniVibe || {};
        const transcript = document.getElementById("transcript");
        const input = document.getElementById("prompt");
        const submit = document.getElementById("submit");
        const form = document.getElementById("prompt-form");
        const hideBtn = document.getElementById("action-hide");
        const wsBtn = document.getElementById("action-workspace");

        const append = (role, text) => {
          const row = document.createElement("div");
          row.className = "row";
          const roleEl = document.createElement("div");
          roleEl.className = "role";
          roleEl.textContent = role;
          const body = document.createElement("div");
          body.textContent = text;
          row.append(roleEl, body);
          transcript.append(row);
          transcript.scrollTop = transcript.scrollHeight;
        };

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          const prompt = (input.value || "").trim();
          if (!prompt) return;
          append("You", prompt);
          input.value = "";
          submit.disabled = true;
          try {
            const reply = (await bridge.submit?.(prompt)) ?? "(no bridge)";
            append("Omni", reply);
          } catch (err) {
            append("Omni", `[error] ${err?.message || "unknown"}`);
          } finally {
            submit.disabled = false;
            input.focus();
          }
        });

        wsBtn.addEventListener("click", async () => {
          const folder = (input.value || "").trim();
          if (!folder) {
            append("Omni", "Enter a folder path in the input first.");
            return;
          }
          const result = await bridge.createWorkspace?.(folder);
          if (result?.ok) append("Omni", `Created workspace for ${folder}.`);
          else append("Omni", `Could not create workspace: ${result?.reason || "unknown"}`);
        });

        hideBtn.addEventListener("click", () => bridge.hide?.());
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            event.preventDefault();
            bridge.hide?.();
          }
        });

        setTimeout(() => input.focus(), 40);
      })();
    </script>
  </body>
</html>
